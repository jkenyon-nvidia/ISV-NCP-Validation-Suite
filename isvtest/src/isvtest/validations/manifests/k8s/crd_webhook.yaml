# Admission webhook validation template for CRD and custom-resource probes.
#
# Loaded and mutated by K8sCrdWebhookCheck. Placeholder values keep this file
# valid YAML; runtime code patches namespace, names, labels, image, certificate
# data, CA bundle, service DNS names, and webhook rule groups/resources.
apiVersion: v1
kind: Secret
metadata:
  name: placeholder
  namespace: placeholder
  annotations:
    isvtest.nvidia.com/crd-webhook-role: secret
type: kubernetes.io/tls
data:
  tls.crt: placeholder
  tls.key: placeholder
---
apiVersion: v1
kind: Service
metadata:
  name: placeholder
  namespace: placeholder
  annotations:
    isvtest.nvidia.com/crd-webhook-role: service
spec:
  selector:
    app: placeholder
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: https
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder
  namespace: placeholder
  annotations:
    isvtest.nvidia.com/crd-webhook-role: deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: placeholder
  template:
    metadata:
      labels:
        app: placeholder
    spec:
      containers:
        - name: agnhost-webhook
          image: placeholder
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - webhook
            - --tls-cert-file=/webhook.local.config/certificates/tls.crt
            - --tls-private-key-file=/webhook.local.config/certificates/tls.key
            - --port=8444
          ports:
            - name: https
              containerPort: 8444
              protocol: TCP
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /readyz
              port: https
            periodSeconds: 1
            failureThreshold: 30
          volumeMounts:
            - name: webhook-certs
              readOnly: true
              mountPath: /webhook.local.config/certificates
      volumes:
        - name: webhook-certs
          secret:
            secretName: placeholder
