# Control Plane Validation - Canonical Contract
#
# Validations-only contract for control plane. Provider configs import
# this file and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields. As long as your scripts output the
# right fields, the validations pass regardless of which cloud you use.
#
# Coverage notes:
# - API Health (check_api) is provider-agnostic: at minimum it must prove
#   authenticated reachability of the platform's object-storage / S3-compatible
#   API. This is sufficient to satisfy the "authenticated endpoint" half of
#   DATASVC-XX-01 (issue #262); the data-path half is covered by the
#   s3_object_lifecycle validation below.
#
# Quick start:
#   1. Copy providers/my-isv/config/control-plane.yaml to providers/<your-platform>/config/control-plane.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/control-plane.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/control-plane.yaml
#   - AWS reference: providers/aws/config/control-plane.yaml + providers/aws/scripts/control-plane/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  platform: control_plane
  cluster_name: "control-plane-validation"
  description: "Control plane: API health, access key lifecycle, tenant lifecycle"

  settings:
    # Provider-specific - override in your provider config
    region: ""
    services: ""

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    api_health:
      step: check_api
      checks:
        FieldExistsCheck:
          test_id: "N/A"
          labels: ["control_plane"]
          fields: ["account_id", "tests"]
        # DATASVC-XX-01 (S3-compatible API w/ authenticated endpoints):
        # authenticated-endpoint half - a successful authenticated check_api
        # response. The data-path half is the CrudOperationsCheck in the
        # "s3_object_lifecycle" section, which declares the same test_id.
        FieldValueCheck:
          test_id: "DATASVC-XX-01"
          labels: ["control_plane", "min_req"]
          field: "success"
          expected: true

    setup_checks:
      checks:
        AccessKeyCreatedCheck:
          test_id: "CP-XX-05"
          labels: ["control_plane", "iam"]
          step: create_access_key
        TenantCreatedCheck:
          test_id: "CP-XX-07"
          labels: ["control_plane", "iam"]
          step: create_tenant

    access_key_lifecycle:
      checks:
        AccessKeyAuthenticatedCheck:
          test_id: "CP-XX-05"
          labels: ["control_plane", "iam"]
          step: test_access_key
        AccessKeyDisabledCheck:
          test_id: "CP-XX-06"
          labels: ["control_plane", "iam", "min_req"]
          step: disable_access_key
        AccessKeyRejectedCheck:
          test_id: "CP-XX-06"
          labels: ["control_plane", "iam", "min_req"]
          step: verify_key_rejected

    tenant_lifecycle:
      checks:
        TenantListedCheck:
          test_id: "CP-XX-08"
          labels: ["control_plane", "iam"]
          step: list_tenants
        TenantInfoCheck:
          test_id: "CP-XX-09"
          labels: ["control_plane", "iam"]
          step: get_tenant

    s3_object_lifecycle:
      step: s3_object_lifecycle
      checks:
        # Data-path half of DATASVC-XX-01 (object put/get/delete); the
        # authenticated-endpoint half is the FieldValueCheck in "api_health".
        StepSuccessCheck:
          test_id: "N/A"
          labels: ["control_plane"]
        FieldExistsCheck:
          test_id: "N/A"
          labels: ["control_plane"]
          fields: ["bucket_name", "object_key", "operations"]
        CrudOperationsCheck:
          test_id: "DATASVC-XX-01"
          labels: ["control_plane", "min_req"]
          operations: ["put", "get", "delete"]

    teardown_checks:
      checks:
        StepSuccessCheck-delete_access_key:
          # No dedicated "delete access key" plan item; access-key lifecycle is
          # CP-XX-05 (create) and CP-XX-06 (disable).
          test_id: "N/A"
          labels: ["control_plane"]
          step: delete_access_key
        StepSuccessCheck-delete_tenant:
          test_id: "CP-XX-10"
          labels: ["control_plane"]
          step: delete_tenant

  exclude:
    labels: []
