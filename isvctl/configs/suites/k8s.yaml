# Kubernetes Cluster Validation Configuration
# This unified config contains all settings for validating a K8s cluster
# K8S_PROVIDER is auto-detected (microk8s vs kubectl).
# To use OpenShift `oc` or another kubectl-compatible CLI, set KUBECTL
# in the environment or under `env` for commands.
#
# Every check carries at least the ``kubernetes`` label (so the suite is
# selectable with ``-m kubernetes``); GPU/workload/slow/l2 trait labels live
# on the wiring rather than the validation class.
#
# Usage:
#   isvctl test run -f isvctl/configs/suites/k8s.yaml
#   isvctl test run -f isvctl/configs/suites/k8s.yaml --phase test  # Skip setup/teardown
#   isvctl test run -f isvctl/configs/suites/k8s.yaml -- -v -s -k "K8sNodeCountCheck"

version: "1.0"

# =============================================================================
# Lifecycle Commands
# =============================================================================
# Stubs that query the cluster and return inventory JSON
commands:
  kubernetes:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "../providers/my-isv/scripts/k8s/setup.sh"
        timeout: 120
      - name: teardown
        phase: teardown
        command: "../providers/my-isv/scripts/k8s/teardown.sh"
        timeout: 30

# =============================================================================
# Test Configuration
# =============================================================================
tests:
  cluster_name: "{{steps.setup.cluster_name}}"
  description: "Kubernetes cluster validation"
  platform: kubernetes

  settings:
    show_skipped_tests: false

  validations:
    # Provider-agnostic node-pool CRUD outcome checks. Keep this category
    # before the regular Kubernetes checks/workloads: update operations can
    # run in the test phase, and their K8sNodePoolCheck must wait for node
    # convergence before the rest of the phase exercises the cluster.
    #
    # Each provisioning step (EKS: terraform; CAPI: kubectl apply) emits a
    # `node_pool` JSON payload that seeds the expected shape below; labels,
    # taints, and instance types come across as JSON strings so Jinja
    # string rendering doesn't mangle the structure, and K8sNodePoolCheck
    # json-parses them. The `step` field binds each check to the phase of
    # the operation it validates, so create can be asserted before update
    # scales the same pool. The check is listed once per operation/pool, so
    # list form is required (dict form would collide on the class name).
    # The separate CPU and GPU create checks prove distinct pools, each with
    # its own instance type and node count, coexist in the same cluster.
    k8s_node_pools:
      - K8sNodePoolCheck:
          # Create (CPU pool): pool reaches desired replica count with its
          # specified CPU instance type.
          test_id: "K8S06-01"
          labels: ["kubernetes", "min_req", "slow"]
          step: create_test_node_pool
          label_selector: "{{ steps.create_test_node_pool.label_selector }}"
          expected_replicas: "{{ steps.create_test_node_pool.expected_replicas | default(1, true) }}"
          expected_labels: "{{ steps.create_test_node_pool.expected_labels_json | default('{}', true) }}"
          expected_taints: "{{ steps.create_test_node_pool.expected_taints_json | default('[]', true) }}"
          expected_instance_types: "{{ steps.create_test_node_pool.expected_instance_types_json | default('[]', true) }}"
          node_type: "{{ steps.create_test_node_pool.node_type | default('cpu') }}"
          wait_timeout: 900
          poll_interval: 10
      - K8sNodePoolCheck:
          # Create (GPU pool): a separate pool reaches its own node count with
          # its specified GPU instance type, coexisting with the CPU pool.
          test_id: "K8S06-01"
          labels: ["kubernetes", "min_req", "slow"]
          step: create_test_gpu_node_pool
          label_selector: "{{ steps.create_test_gpu_node_pool.label_selector }}"
          expected_replicas: "{{ steps.create_test_gpu_node_pool.expected_replicas | default(1, true) }}"
          expected_labels: "{{ steps.create_test_gpu_node_pool.expected_labels_json | default('{}', true) }}"
          expected_taints: "{{ steps.create_test_gpu_node_pool.expected_taints_json | default('[]', true) }}"
          expected_instance_types: "{{ steps.create_test_gpu_node_pool.expected_instance_types_json | default('[]', true) }}"
          node_type: "{{ steps.create_test_gpu_node_pool.node_type | default('gpu') }}"
          wait_timeout: 900
          poll_interval: 10
      - K8sNodePoolCheck:
          # Update (scale): same pool converges to the new count.
          test_id: "K8S06-02"
          labels: ["kubernetes", "min_req", "slow"]
          step: update_test_node_pool
          label_selector: "{{ steps.update_test_node_pool.label_selector }}"
          expected_replicas: "{{ steps.update_test_node_pool.expected_replicas | default(2, true) }}"
          expected_labels: "{{ steps.update_test_node_pool.expected_labels_json | default('{}', true) }}"
          expected_taints: "{{ steps.update_test_node_pool.expected_taints_json | default('[]', true) }}"
          expected_instance_types: "{{ steps.update_test_node_pool.expected_instance_types_json | default('[]', true) }}"
          node_type: "{{ steps.update_test_node_pool.node_type | default('cpu') }}"
          wait_timeout: 900
          poll_interval: 10
      - K8sNodePoolCheck:
          # Delete: assert the throwaway pool reaches zero nodes after the
          # delete step. Selector comes from its create step; the label/taint/
          # instance-type assertions are omitted (no nodes to check).
          test_id: "K8S06-03"
          labels: ["kubernetes", "min_req", "slow"]
          step: delete_test_node_pool
          label_selector: "{{ steps.create_test_delete_node_pool.label_selector }}"
          expected_replicas: 0
          node_type: "{{ steps.create_test_delete_node_pool.node_type | default('cpu') }}"
          wait_timeout: 900
          poll_interval: 10

    # Multi-cluster tenancy/VPC proof (K8S26-01). Only runs for providers that
    # implement create_test_shared_vpc_cluster and bind this check to that step.
    k8s_multi_cluster:
      checks:
        K8sMultiClusterSameVpcCheck:
          test_id: "K8S26-01"
          labels: ["kubernetes", "min_req"]
          step: create_test_shared_vpc_cluster

    kubernetes:
      checks:
        K8sNodeCountCheck:
          test_id: "N/A"
          labels: ["kubernetes"]
          count: "{{ steps.setup.kubernetes.node_count | default(4, true) }}"
        K8sExpectedNodesCheck:
          test_id: "N/A"
          labels: ["kubernetes"]
          names: []
        K8sNodeReadyCheck:
          test_id: "K8S05-01"
          labels: ["kubernetes", "min_req"]
          require_all_ready: true
        K8sNvidiaSmiCheck:
          test_id: "N/A"
          labels: ["kubernetes", "gpu"]
          runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        K8sDriverVersionCheck:
          test_id: "N/A"
          labels: ["kubernetes", "gpu"]
          driver_version: "{{ steps.setup.kubernetes.driver_version | default('580.82.07') }}"
          runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        K8sGpuPodAccessCheck:
          test_id: "N/A"
          labels: ["kubernetes", "gpu"]
          # Note: This check runs nvidia-smi in a pod that requests 1 GPU,
          # so it can only verify 1 GPU is visible per node (K8s isolation).
          # Use gpu_node_count here (not total_gpus) since each pod only sees its allocated GPU.
          gpu_count: 1
          total_gpu_count: "{{ steps.setup.kubernetes.gpu_node_count | default(4, true) }}"
          runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        K8sGpuCapacityCheck:
          test_id: "N/A"
          labels: ["kubernetes", "gpu"]
          # This queries node capacity directly - shows real GPU count
          resource_name: "{{ steps.setup.kubernetes.gpu_resource_name | default('nvidia.com/gpu') }}"
          expected_per_node: "{{ steps.setup.kubernetes.gpu_per_node | default(4, true) }}"
          expected_total: "{{ steps.setup.kubernetes.total_gpus | default(16, true) }}"
        K8sGpuOperatorNamespaceCheck:
          test_id: "K8S25-01"
          labels: ["kubernetes", "min_req"]
          namespace: "{{ steps.setup.kubernetes.gpu_operator_namespace | default('nvidia-gpu-operator') }}"
        K8sGpuOperatorPodsCheck:
          test_id: "K8S25-01"
          labels: ["kubernetes", "min_req"]
          namespace: "{{ steps.setup.kubernetes.gpu_operator_namespace | default('nvidia-gpu-operator') }}"
        K8sGpuLabelsCheck:
          test_id: "N/A"
          labels: ["kubernetes", "gpu"]
          label_selector: "nvidia.com/gpu.present=true"
        K8sPodHealthCheck:
          test_id: "N/A"
          labels: ["kubernetes"]
          ignore_phases: ["Pending"]
        K8sNoPendingPodsCheck:
          test_id: "N/A"
          labels: ["kubernetes"]
        K8sNoErrorPodsCheck:
          test_id: "N/A"
          labels: ["kubernetes"]
          error_states: ["Error", "CrashLoopBackOff"]
        K8sMigConfigCheck:
          test_id: "N/A"
          labels: ["kubernetes", "gpu"]
          require_mig: false
          expected_labels:
            "nvidia.com/mig.capable": "true"
            "nvidia.com/mig.strategy": "single"
        K8sDualStackNodeCheck:
          test_id: "K8S22-01"
          labels: ["kubernetes", "min_req"]
          require_dual_stack: "auto" # true | false | "auto"
        K8sClusterAutoscalerCheck:
          test_id: "K8S36-01"
          labels: ["kubernetes", "min_req"]
          require_autoscaler: false
          namespace: "{{ steps.setup.kubernetes.cluster_autoscaler_namespace | default('kube-system', true) }}"
          deployment_names:
            - "{{ steps.setup.kubernetes.cluster_autoscaler_deployment | default('cluster-autoscaler', true) }}"
          label_selectors:
            - "app.kubernetes.io/name=cluster-autoscaler"
            - "app=cluster-autoscaler"
            - "k8s-app=cluster-autoscaler"
        K8sNetworkPolicyCheck:
          test_id: "K8S22-01"
          labels: ["kubernetes", "min_req"]
          image: "registry.k8s.io/e2e-test-images/agnhost:2.47"
          probe_port: 8080
          probe_timeout_s: 10
          settle_timeout_s: 30
          namespace_prefix: "isvtest-netpol"
          test_egress: true
        K8sCrdWebhookCheck:
          test_id: "K8S21-01"
          labels: ["kubernetes", "min_req"]
          image: "registry.k8s.io/e2e-test-images/agnhost:2.47"
          namespace_prefix: "isvtest-crd-webhook"
          wait_timeout: 180
          poll_interval: 2

    k8s_storage:
      checks:
        K8sCsiStorageTypesCheck:
          test_id: "K8S23-04"
          labels: ["kubernetes", "min_req"]
          # StorageClass names by type; omit (or leave empty) to skip that type.
          # Env overrides: K8S_CSI_BLOCK_SC, K8S_CSI_SHARED_FS_SC, K8S_CSI_NFS_SC.
          block_storage_class: "{{ steps.setup.csi.block_storage_class | default('', true) }}"
          shared_fs_storage_class: "{{ steps.setup.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.setup.csi.nfs_storage_class | default('', true) }}"
          pvc_size: "1Gi"
          bind_timeout_s: 120
          namespace_prefix: "isvtest-csi-types"
        K8sCsiStorageQuotaApiCheck:
          test_id: "K8S23-07"
          labels: ["kubernetes", "min_req"]
          # Uses the block StorageClass by default; skips entirely when unset.
          # per_sc_quota must exceed pvc_request so the usage PVC fits, and
          # over_quota_request must exceed per_sc_quota so admission rejects it.
          storage_class: "{{ steps.setup.csi.block_storage_class | default('', true) }}"
          total_quota: "10Gi"
          per_sc_quota: "5Gi"
          pvc_request: "1Gi"
          over_quota_request: "100Gi"
          bind_timeout_s: 120
          quota_settle_s: 30
          namespace_prefix: "isvtest-csi-quota"
        K8sCsiTenantScopedCredentialsCheck:
          test_id: "K8S23-06"
          labels: ["kubernetes", "min_req"]
          # Pure read-only check: verifies CSI credentials are tenant-scoped
          # by construction (Secret namespaces, labels/annotations, RBAC,
          # and node-plugin volume topology). Skipped entirely when no
          # CSIDriver objects exist.
          csi_driver_namespaces:
            - "kube-system"
          allowed_workload_namespaces: []
          forbidden_labels:
            - "shared-across-clusters=true"
        K8sCsiProvisioningModesCheck:
          test_id: "K8S23-05"
          labels: ["kubernetes", "min_req"]
          # Exercises dynamic and static CSI provisioning end-to-end with a
          # BusyBox mount + canary-file write/read. Skipped entirely when
          # dynamic_storage_class is unset. The static subtest is skipped
          # (not failed) when static_pv.volume_handle / csi_driver are
          # unset, so providers that don't pre-provision a volume can still
          # run the dynamic probe.
          dynamic_storage_class: "{{ steps.setup.csi.block_storage_class | default('', true) }}"
          static_pv:
            volume_handle: "{{ steps.setup.csi.static_volume_handle | default('', true) }}"
            csi_driver: "{{ steps.setup.csi.static_driver_name | default('', true) }}"
            fs_type: "ext4"
            capacity: "1Gi"
            access_mode: "ReadWriteOnce"
          bind_timeout_s: 180
          namespace_prefix: "isvtest-csi-prov"

    k8s_identity:
      checks:
        K8sOidcIssuerCheck:
          test_id: "K8S17-02"
          labels: ["kubernetes", "min_req"]

    k8s_conformance:
      checks:
        K8sCncfConformanceCheck:
          test_id: "K8S01-01"
          labels: ["kubernetes", "l2", "min_req", "slow"]
          # Valid `mode` values (see docs/guides/configuration.md#kubernetes-conformance-modes):
          #   - "certified-conformance": full [Conformance] suite, serial. Required
          #     for CNCF certification; expect multi-hour runtime.
          #   - "non-disruptive-conformance": [Conformance] minus [Disruptive] and
          #     [Serial]; safe against clusters carrying other workloads.
          #   - "quick": single ConfigMap smoke test of the harness itself; no real
          #     conformance coverage.
          mode: "quick"
          timeout: 7200
          startup_timeout: 600
          cleanup_namespace: true
          report_individual_tests: false

    k8s_workloads:
      checks:
        K8sNcclWorkload:
          test_id: "K8S33-01"
          labels: ["gpu", "kubernetes", "min_req", "slow", "workload"]
          min_bus_bw_gbps: 100
          timeout: 600
        K8sNcclMultiNodeWorkload:
          test_id: "K8S33-01"
          labels: ["gpu", "kubernetes", "min_req", "slow", "workload"]
          nodes: "{{ steps.setup.kubernetes.gpu_node_count | default(2, true) }}"
          min_bus_bw_gbps: 100
          quick_mode: false
          timeout: 600
          use_compute_domain: auto
        K8sGpuStressWorkload:
          test_id: "N/A"
          labels: ["kubernetes", "gpu", "workload", "slow"]
          memory_gb: 1
          runtime: 30
          timeout: 300
        K8sNimInferenceWorkload:
          test_id: "K8S40-01"
          labels: ["kubernetes", "gpu", "workload", "slow"]
          timeout: 1500
        K8sNimHelmWorkload-1b:
          test_id: "K8S32-01"
          labels: ["kubernetes", "gpu", "workload", "slow"]
          model: "meta/llama-3.2-1b-instruct"
          model_tag: "latest"
          gpu_count: 1
          timeout: 900
          genai_perf_requests: 100
          genai_perf_concurrency: 4
        K8sNimHelmWorkload-3b:
          test_id: "K8S32-01"
          labels: ["kubernetes", "gpu", "workload", "slow"]
          model: "meta/llama-3.2-3b-instruct"
          model_tag: "latest"
          gpu_count: "{{ steps.setup.kubernetes.gpu_per_node | default(4, true) }}"
          timeout: 1800
          genai_perf_requests: 200
          genai_perf_concurrency: 8

    k8s_observability:
      checks:
        K8sApiServerMetricsCheck:
          test_id: "K8S07-01"
          labels: ["kubernetes", "min_req"]
        K8sControlPlaneLogsCheck:
          test_id: "K8S20-01"
          labels: ["kubernetes", "min_req"]
          # mode=auto resolves each component independently: kubectl when a
          # control-plane pod exists in `namespace`, else `commands[component]`.
          # This covers hybrid clusters (some components as static pods, others
          # managed externally). Managed-provider examples:
          #   commands:
          #     kube-apiserver: >-
          #       aws logs tail /aws/eks/my-cluster/cluster
          #       --log-stream-name-prefix kube-apiserver- --since 5m
          #     kube-scheduler: >-
          #       gcloud logging read
          #       'resource.type=k8s_cluster AND logName:kube-scheduler'
          #       --limit 20 --freshness 5m
          #     kube-controller-manager: >-
          #       az monitor log-analytics query -w $LAW_ID --analytics-query
          #       "KubeEvents | where ObjectKind == 'kube-controller-manager'
          #       | take 20"
          # `namespace` is only used by the kubectl path; `since` is forwarded
          # to `kubectl logs --since` and ignored in command mode.
          mode: auto
          components:
            - kube-apiserver
            - kube-scheduler
            - kube-controller-manager
          min_log_lines: 1
          namespace: "{{ steps.setup.kubernetes.control_plane_namespace | default('kube-system') }}"
          tail: 20

    k8s_network:
      checks:
        K8sApiNetworkAclCheck:
          test_id: "K8S15-01"
          labels: ["kubernetes", "min_req"]
          # Probe-based, provider-agnostic: verifies the reviewed cluster's
          # Kubernetes API endpoint refuses connections from a source that
          # should be blocked. By default the validation uses the configured
          # kubectl context as the authorized baseline (`kubectl get --raw
          # /readyz`). Set `commands.authorized_probe` only when that default
          # is not the right health probe for the reviewed cluster. Leave
          # `commands.unauthorized_probe` empty to skip until the provider
          # supplies a real outside vantage point.
          #
          # `api_endpoint` is the canonical API URL (e.g. `https://api:6443`).
          # When set, the check enforces that (a) the unauthorized probe
          # references that host and (b) kubectl is pointed at the same
          # host:port - this catches typo'd unauth targets and silently
          # divergent kubeconfigs. Providers that intentionally drive
          # kubectl through a different path than the unauth probe (e.g.
          # private-link kubectl + public unauth probe) should override this
          # check in their own config and set `expect_separate_endpoints:
          # true` (literal YAML bool) to disable the consistency checks.
          commands:
            # `authorized_probe` is intentionally omitted: the validation
            # falls back to `kubectl get --raw <api_health_path>` against
            # the configured kubectl context. Providers that need a
            # different baseline can override this key in their config.
            unauthorized_probe: "{{ steps.setup.kubernetes.unauthorized_probe_cmd | default('', true) }}"
          api_health_path: "/readyz"
          probe_timeout_s: 10
          api_endpoint: "{{ steps.setup.kubernetes.api_endpoint | default('', true) }}"

  exclude:
    labels: []
