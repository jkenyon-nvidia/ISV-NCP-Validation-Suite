# Bare Metal (BMaaS) Validation - Canonical Contract
#
# Validations-only contract for bare metal. Provider configs import this
# file and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields. As long as your scripts output the
# right fields, the validations pass regardless of which cloud you use.
#
# Quick start:
#   1. Copy providers/my-isv/config/bare_metal.yaml to providers/<your-platform>/config/bare_metal.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/bare_metal.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/bare_metal.yaml
#   - AWS reference: providers/aws/config/bare_metal.yaml + providers/aws/scripts/bare_metal/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  platform: bare_metal
  cluster_name: "bm-validation"
  description: "Bare metal (BMaaS) GPU validation tests"

  settings:
    # Provider-specific - override in your provider config
    region: ""
    instance_type: "{{instance_type}}" # Supply your platform-equivalent bare-metal/GPU instance type
    teardown_flag: "{{(env.BM_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    setup_checks:
      step: launch_instance
      checks:
        InstanceStateCheck:
          test_id: "N/A"
          labels: ["bare_metal"]
          expected_state: "running"

    list_instances:
      step: list_instances
      checks:
        InstanceListCheck:
          # CNP01-11 (list nodes) is a VMaaS plan item; the BMaaS plan has no equivalent list-nodes item.
          test_id: "N/A"
          labels: ["bare_metal"]
          min_count: 1

    tag_checks:
      step: verify_tags
      checks:
        InstanceTagCheck:
          test_id: "CNP05-01"
          labels: ["bare_metal", "min_req"]
          required_keys: ["Name", "CreatedBy"]

    topology_placement:
      step: topology_placement
      checks:
        StepSuccessCheck:
          test_id: "N/A"
          labels: ["bare_metal"]
        TopologyPlacementCheck:
          test_id: "CNP01-04"
          labels: ["bare_metal", "min_req"]

    serial_console:
      step: serial_console
      checks:
        SerialConsoleCheck:
          test_id: "CNP06-01"
          labels: ["bare_metal", "min_req"]
        SerialConsoleRetentionCheck:
          test_id: "CNP06-02"
          labels: ["bare_metal", "min_req"]

    cloud_init:
      step: launch_instance
      checks:
        CloudInitCheck:
          test_id: "BOOT02-01"
          labels: ["bare_metal", "min_req", "ssh"]

    instance_info:
      step: describe_instance
      checks:
        InstanceStateCheck:
          test_id: "N/A"
          labels: ["bare_metal"]
          expected_state: "running"

    ssh:
      step: describe_instance
      checks:
        ConnectivityCheck:
          test_id: "BMAAS03-01"
          labels: ["bare_metal", "ssh"]
        OsCheck:
          # No BMaaS plan item for a host-OS image check (VMAAS-XX-05 is VM-only).
          test_id: "N/A"
          labels: ["bare_metal", "ssh"]
          expected_os: "ubuntu"

    gpu:
      step: describe_instance
      checks:
        GpuCheck:
          test_id: "BMAAS08-01"
          labels: ["bare_metal", "ssh", "gpu"]
          expected_gpus: 8

    host_os:
      step: describe_instance
      checks:
        # vCPU pinning / PCI passthrough / host-software are VMAAS plan items;
        # the BMaaS plan has no equivalent, so these are intentional gaps here.
        VcpuPinningCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh"]
        PciBusCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh", "gpu"]
          expected_gpus: 8
        HostSoftwareCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh"]

    # Per-host status log sampling: verify journalctl/dmesg
    # are emitting fresh entries within max_age_minutes. Pass if at least
    # one source has recent entries (set required_sources to enforce all).
    host_status_logs:
      step: host_status_log
      checks:
        StepSuccessCheck:
          test_id: "N/A"
          labels: ["bare_metal"]
        BmHostStatusLog:
          test_id: "BMAAS07-01"
          labels: ["bare_metal"]

    # GPU stress test - PyTorch matrix multiplications on all GPUs
    gpu_stress:
      step: describe_instance
      checks:
        GpuStressCheck:
          test_id: "BMAAS09-01"
          labels: ["bare_metal", "gpu", "min_req", "ssh", "workload"]
          runtime: 30
          memory_gb: 16

    # NCCL AllReduce - validates GPU-to-GPU communication (NVLink/NVSwitch)
    nccl:
      step: describe_instance
      checks:
        NcclCheck:
          test_id: "BMAAS11-01"
          labels: ["bare_metal", "gpu", "min_req", "ssh", "workload"]

    # DDP training workload - validates full training stack
    training:
      step: describe_instance
      checks:
        TrainingCheck:
          test_id: "BMAAS12-01"
          labels: ["bare_metal", "gpu", "min_req", "ssh", "workload"]
          steps: 50

    # Network / interconnect checks
    nvlink:
      step: describe_instance
      checks:
        NvlinkCheck:
          test_id: "BMAAS06-01"
          labels: ["bare_metal", "ssh", "gpu", "network"]

    infiniband:
      step: describe_instance
      checks:
        InfiniBandCheck:
          test_id: "BMAAS06-01"
          labels: ["bare_metal", "gpu", "network", "ssh"]

    ethernet:
      step: describe_instance
      checks:
        EthernetCheck:
          test_id: "BMAAS06-01"
          labels: ["bare_metal", "gpu", "network", "ssh"]
          ping_target: "8.8.8.8"

    driver_info:
      step: describe_instance
      checks:
        # No BMaaS plan item for a host driver/kernel check (VMAAS-XX-07 is VM-only).
        DriverCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh", "gpu"]

    cpu_info:
      step: describe_instance
      checks:
        CpuInfoCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh"]

    container_runtime:
      step: describe_instance
      checks:
        ContainerRuntimeCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh", "gpu", "workload", "slow"]

    stop_checks:
      step: stop_instance
      checks:
        InstanceStopCheck:
          test_id: "CNP01-07"
          labels: ["bare_metal", "min_req"]

    start_checks:
      step: start_instance
      checks:
        InstanceStartCheck:
          test_id: "CNP01-08"
          labels: ["bare_metal", "min_req"]
        StableIdentifierCheck:
          test_id: "CNP08-01"
          labels: ["bare_metal", "min_req"]
          reference_id: "{{steps.launch_instance.instance_id}}"

    # SSH/GPU checks bound to start_instance / reboot_instance use the IP
    # captured by describe_instance (which runs last, post-power-cycle) - the
    # IPs in start/reboot step outputs are stale on platforms that reassign
    # public IPs across power-cycle.
    start_ssh:
      step: start_instance
      checks:
        # ConnectivityCheck -> BMAAS-XX-03, OsCheck -> N/A (declared in the "ssh" section)
        ConnectivityCheck:
          test_id: "BMAAS03-01"
          labels: ["bare_metal", "ssh"]
          host: "{{steps.describe_instance.public_ip}}"
          key_file: "{{steps.describe_instance.key_file}}"
        OsCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh"]
          host: "{{steps.describe_instance.public_ip}}"
          key_file: "{{steps.describe_instance.key_file}}"
          expected_os: "ubuntu"

    start_gpu:
      step: start_instance
      checks:
        # GpuCheck -> BMAAS-XX-08 (declared in the "gpu" section)
        GpuCheck:
          test_id: "BMAAS08-01"
          labels: ["bare_metal", "ssh", "gpu"]
          host: "{{steps.describe_instance.public_ip}}"
          key_file: "{{steps.describe_instance.key_file}}"

    reboot_checks:
      step: reboot_instance
      checks:
        InstanceRebootCheck:
          test_id: "CNP01-05"
          labels: ["bare_metal", "min_req"]
          max_uptime: 600
        # StableIdentifierCheck -> CNP08-01 (declared in the "start_checks" section)
        StableIdentifierCheck:
          test_id: "CNP08-01"
          labels: ["bare_metal", "min_req"]
          reference_id: "{{steps.launch_instance.instance_id}}"

    reboot_state:
      step: reboot_instance
      checks:
        InstanceStateCheck:
          test_id: "N/A"
          labels: ["bare_metal"]
          expected_state: "running"

    reboot_ssh:
      step: reboot_instance
      checks:
        # ConnectivityCheck -> BMAAS-XX-03, OsCheck -> N/A (declared in the "ssh" section)
        ConnectivityCheck:
          test_id: "BMAAS03-01"
          labels: ["bare_metal", "ssh"]
          host: "{{steps.describe_instance.public_ip}}"
          key_file: "{{steps.describe_instance.key_file}}"
        OsCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh"]
          host: "{{steps.describe_instance.public_ip}}"
          key_file: "{{steps.describe_instance.key_file}}"
          expected_os: "ubuntu"

    reboot_gpu:
      step: reboot_instance
      checks:
        # GpuCheck -> BMAAS-XX-08 (declared in the "gpu" section)
        GpuCheck:
          test_id: "BMAAS08-01"
          labels: ["bare_metal", "ssh", "gpu"]
          host: "{{steps.describe_instance.public_ip}}"
          key_file: "{{steps.describe_instance.key_file}}"
          expected_gpus: 8

    power_cycle_checks:
      step: power_cycle_instance
      checks:
        InstancePowerCycleCheck:
          test_id: "CNP01-06"
          labels: ["bare_metal", "min_req"]
          max_recovery_time: 900
        # StableIdentifierCheck -> CNP08-01 (declared in the "start_checks" section)
        StableIdentifierCheck:
          test_id: "CNP08-01"
          labels: ["bare_metal", "min_req"]
          reference_id: "{{steps.launch_instance.instance_id}}"

    power_cycle_state:
      step: power_cycle_instance
      checks:
        InstanceStateCheck:
          test_id: "N/A"
          labels: ["bare_metal"]
          expected_state: "running"

    power_cycle_ssh:
      step: power_cycle_instance
      checks:
        # ConnectivityCheck -> BMAAS-XX-03, OsCheck -> N/A (declared in the "ssh" section)
        ConnectivityCheck:
          test_id: "BMAAS03-01"
          labels: ["bare_metal", "ssh"]
        OsCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh"]
          expected_os: "ubuntu"

    power_cycle_gpu:
      step: power_cycle_instance
      checks:
        # GpuCheck -> BMAAS-XX-08 (declared in the "gpu" section)
        GpuCheck:
          test_id: "BMAAS08-01"
          labels: ["bare_metal", "ssh", "gpu"]
          expected_gpus: 8

    # Reinstall validations (skipped when reinstall_instance step is skipped)
    reinstall_state:
      step: reinstall_instance
      checks:
        InstanceStateCheck:
          test_id: "N/A"
          labels: ["bare_metal"]
          expected_state: "running"
        StableIdentifierCheck:
          test_id: "CNP08-01"
          labels: ["bare_metal", "min_req"]
          reference_id: "{{steps.launch_instance.instance_id}}"

    reinstall_ssh:
      step: reinstall_instance
      checks:
        # ConnectivityCheck -> BMAAS-XX-03, OsCheck -> N/A (declared in the "ssh" section)
        ConnectivityCheck:
          test_id: "BMAAS03-01"
          labels: ["bare_metal", "ssh"]
        OsCheck:
          test_id: "N/A"
          labels: ["bare_metal", "ssh"]
          expected_os: "ubuntu"

    reinstall_gpu:
      step: reinstall_instance
      checks:
        # GpuCheck -> BMAAS-XX-08 (declared in the "gpu" section)
        GpuCheck:
          test_id: "BMAAS08-01"
          labels: ["bare_metal", "ssh", "gpu"]

    nim_health:
      step: deploy_nim
      checks:
        NimHealthCheck:
          test_id: "BMAAS10-01"
          labels: ["bare_metal", "gpu", "min_req", "slow", "ssh", "workload"]

    nim_models:
      step: deploy_nim
      checks:
        NimModelCheck:
          test_id: "BMAAS10-01"
          labels: ["bare_metal", "gpu", "min_req", "slow", "ssh", "workload"]

    nim_inference:
      step: deploy_nim
      checks:
        NimInferenceCheck:
          test_id: "BMAAS10-01"
          labels: ["bare_metal", "gpu", "min_req", "slow", "ssh", "workload"]
          prompt: "What is CUDA?"
          max_tokens: 50

    nim_teardown:
      step: teardown_nim
      checks:
        StepSuccessCheck:
          test_id: "N/A"
          labels: ["bare_metal"]

    teardown_checks:
      step: teardown
      checks:
        StepSuccessCheck:
          test_id: "N/A"
          labels: ["bare_metal"]

    sanitization:
      step: verify_teardown
      checks:
        StepSuccessCheck:
          test_id: "SEC21-01"
          labels: ["bare_metal", "min_req", "security"]

    # Hardware ingestion: expected-machine manifest vs discovered machines.
    # Only runs for providers that implement the verify_ingestion step.
    ingestion_check:
      step: verify_ingestion
      checks:
        HardwareIngestionCheck:
          test_id: "HWING01-01"
          labels: ["bare_metal", "ingestion"]
          min_machines: 1
          expected_status: ["Ready", "InUse"]
          require_healthy: true

    # DPU health: presence, agent heartbeat, and machine-level health alerts.
    # Only runs for providers that implement the check_dpu_health step.
    dpu_health:
      step: check_dpu_health
      checks:
        DpuHealthCheck:
          test_id: "BMAAS05-01"
          labels: ["bare_metal", "dpu"]
          require_heartbeat: true

    # Governance metrics (CAP01-01): the provider's governance API must
    # surface Delivered, Healthy, Reserved, and Active counts for nodes and
    # GPUs. Only runs for providers that implement the
    # query_governance_metrics step.
    governance_metrics:
      step: query_governance_metrics
      checks:
        GovernanceMetricsCheck:
          test_id: "CAP01-01"
          labels: ["bare_metal", "governance", "min_req"]
          min_delivered_nodes: 1

    # Per-host health API (CAP05-01). Asserts the API returns a report per host
    # and the host is alert-free. Only runs for providers that implement the
    # query_host_health step. fail_on_classifications is omitted so ANY alert
    # (BMC sensor critical/failure, BmcLeakDetection/Leak, DPU heartbeat, ...)
    # fails the host; set it to scope failures to specific severities, or set
    # require_probes to enforce that specific signals are present.
    host_health:
      step: query_host_health
      checks:
        HostHealthCheck:
          test_id: "CAP05-01"
          labels: ["bare_metal", "health", "min_req"]
          require_report: true

    # Primitive-level health aggregation at the nodegroup/reservation level
    # (CAP05-02). Only runs for providers that implement the
    # query_health_aggregation step.
    health_aggregation:
      step: query_health_aggregation
      checks:
        HealthAggregationCheck:
          test_id: "CAP05-02"
          labels: ["bare_metal", "health", "min_req"]
          min_groups: 1

    # InfiniBand tenant isolation (SDN04-04). Verifies each tenant's IB
    # compute is scoped to its own P_Key partition (the subnet manager only
    # passes traffic between ports sharing a P_Key), so compute dedicated to
    # one tenant is isolated from other customers. Only runs for providers
    # that implement the query_ib_tenant_isolation step.
    ib_tenant_isolation:
      step: query_ib_tenant_isolation
      checks:
        IbTenantIsolationCheck:
          test_id: "SDN04-04"
          labels: ["bare_metal", "infiniband", "min_req", "network", "security"]
          min_partitions: 1

    # InfiniBand security keys (SDN04-05). The full requirement covers the
    # P_Key plus the OpenSM/SHARP subnet-manager keys (Management,
    # Aggregation Management, VendorSpecific, CongestionControl, Node2Node,
    # Manager2Node). required_keys is scoped to the keys NICo can observe:
    # the P_Key (NICo partition API) and the Management Key (UFM /app/smconf,
    # when UFM access is configured). The remaining subnet-manager keys live
    # on the UFM host and are reported as unverified. Only runs for providers
    # that implement the query_ib_keys step.
    ib_keys_configured:
      step: query_ib_keys
      checks:
        IbKeysConfiguredCheck:
          test_id: "SDN04-05"
          labels: ["bare_metal", "infiniband", "min_req", "network", "security"]
          required_keys: ["p_key", "management_key"]

    # Tenant-transition data sanitization (SEC21 / SEC22). Each check asserts
    # that a host which served a tenant is not returned to the allocatable pool
    # until it passes through the platform's sanitizing lifecycle stage. Only
    # runs for providers that implement the query_sanitization step.
    #   - SEC21-02: storage/disk securely erased on delete (low level).
    #   - SEC21-04: host (RAM) memory sanitization between tenants.
    #   - SEC21-05: SRAM/GPU memory sanitization between tenants (GPU hosts).
    #   - SEC21-06 / SEC22: TPM clear and BIOS/UEFI recommit on transition.
    memory_sanitization:
      step: query_sanitization
      checks:
        MemorySanitizationCheck:
          test_id: "SEC21-04"
          labels: ["bare_metal", "min_req", "sanitization", "security"]

    gpu_memory_sanitization:
      step: query_sanitization
      checks:
        GpuMemorySanitizationCheck:
          test_id: "SEC21-05"
          labels: ["bare_metal", "gpu", "min_req", "sanitization", "security"]

    firmware_reset:
      step: query_sanitization
      checks:
        FirmwareResetCheck:
          test_id: "SEC21-06"
          labels: ["bare_metal", "firmware", "min_req", "sanitization", "security"]

    # SEC21-02: confirm storage is sanitized on delete. Gates on the same
    # sanitizing lifecycle stage as the memory check, because that stage also
    # performs the NVMe/HDD secure erase and a host only returns to the pool
    # once it completes, so a prior tenant's on-disk data cannot leak forward.
    disk_sanitization:
      step: query_sanitization
      checks:
        DiskSanitizationCheck:
          test_id: "SEC21-02"
          labels: ["bare_metal", "disk", "min_req", "sanitization", "security"]

    # Hardware/firmware attestation (SEC22 / CNP09). Each check asserts a host
    # establishes a hardware root of trust. Only runs for providers that
    # implement the query_attestation step.
    #   - SEC22-01: each host passes a fresh nonce-based attestation (the
    #     verifier nonce is echoed in a validly signed quote).
    #   - CNP09-02: all firmware is cryptographically signed and its boot
    #     measurements are attested (secure boot on, golden PCR values matched).
    nonce_attestation:
      step: query_attestation
      checks:
        NonceAttestationCheck:
          test_id: "SEC22-01"
          labels: ["bare_metal", "security", "attestation"]

    firmware_attestation:
      step: query_attestation
      checks:
        FirmwareAttestationCheck:
          test_id: "CNP09-02"
          labels: ["attestation", "bare_metal", "firmware", "min_req", "security"]

  exclude:
    labels: []
