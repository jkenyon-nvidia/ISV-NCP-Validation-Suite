# Slurm Cluster Validation Configuration
# For HPC clusters with Slurm workload manager
#
# Usage:
#   isvctl test run -f isvctl/configs/suites/slurm.yaml
#   isvctl test run -f isvctl/configs/suites/slurm.yaml -- -v -s

version: "1.0"

# =============================================================================
# Lifecycle Commands
# =============================================================================
commands:
  slurm:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "../providers/my-isv/scripts/slurm/setup.sh"
        timeout: 120
      - name: teardown
        phase: teardown
        command: "../providers/my-isv/scripts/slurm/teardown.sh"
        timeout: 30

# =============================================================================
# Test Configuration
# =============================================================================
tests:
  cluster_name: "{{steps.setup.cluster_name}}"
  description: "Slurm cluster validation"
  platform: slurm

  settings:
    show_skipped_tests: false

  validations:
    slurm:
      checks:
        SlurmInfoAvailable:
          test_id: "SLURM02-01"
          labels: ["slurm"]
          min_partitions: 1
        SlurmPartition-cpu:
          test_id: "SLURM03-01"
          labels: ["slurm"]
          partition_name: "cpu"
          expected_nodes: "{{ steps.setup.slurm.partitions.cpu.nodes | default([]) | length }}"
          required_nodes: '{{ steps.setup.slurm.partitions.cpu.nodes | default([]) | tojson }}'
          require_available: true
        SlurmPartition-gpu:
          test_id: "SLURM03-01"
          labels: ["slurm"]
          partition_name: "gpu"
          expected_nodes: "{{ steps.setup.slurm.partitions.gpu.nodes | default([]) | length }}"
          required_nodes: '{{ steps.setup.slurm.partitions.gpu.nodes | default([]) | tojson }}'
          require_available: true
        SlurmJobSubmission:
          test_id: "SLURM04-01"
          labels: ["slurm"]
        SlurmGpuAllocation-1gpu:
          test_id: "SLURM05-01"
          labels: ["slurm"]
          num_gpus: 1
        SlurmGpuAllocation-2gpu:
          test_id: "SLURM05-01"
          labels: ["slurm"]
          num_gpus: 2
        SlurmNodeJobExecution-cpu:
          test_id: "SLURM06-01"
          labels: ["slurm"]
          partition_name: "cpu"
          storage_path: "{{ steps.setup.slurm.storage_path | default('/tmp') }}"
        SlurmNodeJobExecution-gpu:
          test_id: "SLURM06-01"
          labels: ["slurm"]
          partition_name: "gpu"
          storage_path: "{{ steps.setup.slurm.storage_path | default('/tmp') }}"

    # Slurm workloads - longer running GPU stress tests
    slurm_workloads:
      checks:
        SlurmGpuStressWorkload:
          test_id: "SLURM07-01"
          labels: ["slurm", "gpu", "workload", "slow"]
          partition: "{{ steps.setup.slurm.default_partition | default('gpu') }}"
          runtime: 30
          memory_gb: 16
          timeout: 900
          cuda_arch: "{{ steps.setup.slurm.cuda_arch | default('100') }}"

        # Multi-node NCCL test - validates GPU communication across nodes
        SlurmNcclMultiNodeWorkload:
          test_id: "SLURM08-01"
          labels: ["slurm", "gpu", "workload", "slow"]
          partition: "{{ steps.setup.slurm.default_partition | default('gpu') }}"
          nodes: "{{ steps.setup.slurm.partitions.gpu.nodes | default([]) | length }}"
          # gpus_per_node: auto-detected from partition GRES if not specified
          min_bus_bw_gbps: 100 # Set to expected bandwidth to enforce threshold
          quick_mode: false
          timeout: 900

        # Run GPU job from manifest file with variable substitution
        SlurmSbatchWorkload-gpu:
          test_id: "SLURM09-01"
          labels: ["slurm", "workload", "slow"]
          script: "example_gpu_job.sbatch"
          variables:
            JOB_NAME: "demo-gpu-test"
            PARTITION: "gpu"
            NODES: "{{ steps.setup.slurm.partitions.gpu.nodes | default([]) | length }}"
            GPUS_PER_NODE: 4
            TIME_LIMIT: "00:10:00"
          timeout: 600
          cleanup: false

        # Run CPU job from manifest file
        SlurmSbatchWorkload-cpu:
          test_id: "SLURM09-01"
          labels: ["slurm", "workload", "slow"]
          script: "example_cpu_job.sbatch"
          variables:
            JOB_NAME: "demo-cpu-test"
            PARTITION: "cpu"
            NODES: "{{ steps.setup.slurm.partitions.cpu.nodes | default([]) | length }}"
            CPUS_PER_TASK: 4
            TIME_LIMIT: "00:01:00"
          timeout: 60

        # Inline script (no manifest file needed)
        SlurmSbatchWorkload-inline:
          test_id: "SLURM09-01"
          labels: ["slurm", "workload", "slow"]
          script_content: |
            #!/bin/bash
            #SBATCH --job-name=inline-test
            #SBATCH --partition=gpu
            #SBATCH --gres=gpu:1
            #SBATCH --nodes=1
            #SBATCH --time=00:01:00
            echo "Hello from inline script"
            nvidia-smi
          timeout: 60

  exclude:
    labels: []
