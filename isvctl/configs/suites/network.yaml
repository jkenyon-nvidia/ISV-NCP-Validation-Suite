# Network Validation - Canonical Contract
#
# Validations-only contract for network. Provider configs import this
# file and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields. As long as your scripts output the
# right fields, the validations pass regardless of which cloud you use.
#
# Quick start:
#   1. Copy providers/my-isv/config/network.yaml to providers/<your-platform>/config/network.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/network.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/network.yaml
#   - AWS reference: providers/aws/config/network.yaml + providers/aws/scripts/network/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  cluster_name: "network-validation"
  description: "Network validation tests"
  platform: network

  settings:
    # Provider-specific - override in your provider config
    region: ""

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    setup_checks:
      step: create_network
      checks:
        # Setup provisioning gate; VPC create lifecycle maps to SDN01-01 (VpcCrudCheck-create).
        NetworkProvisionedCheck:
          test_id: "N/A"
          labels: ["network"]
          require_subnets: true
          min_subnets: 2

    network:
      checks:
        # VPC CRUD is split per operation so each maps to one plan id; all four
        # bind to the same vpc_crud step and assert their slice of its output.
        VpcCrudCheck-create:
          test_id: "SDN01-01"
          labels: ["min_req", "network"]
          step: vpc_crud
          operations: ["create_vpc"]
        VpcCrudCheck-read:
          test_id: "SDN01-02"
          labels: ["min_req", "network"]
          step: vpc_crud
          operations: ["read_vpc"]
        VpcCrudCheck-update:
          test_id: "SDN01-03"
          labels: ["min_req", "network"]
          step: vpc_crud
          operations: ["update_tags", "update_dns"]
        VpcCrudCheck-delete:
          test_id: "SDN01-04"
          labels: ["min_req", "network"]
          step: vpc_crud
          operations: ["delete_vpc"]
        # no test id for subnet count / multi-AZ layout (SDN04-01 covers exclusive-subnet isolation, not subnet topology).
        SubnetConfigCheck:
          test_id: "N/A"
          labels: ["network"]
          step: subnet_config
          min_subnets: 4
          require_multi_az: true
        VpcIsolationCheck:
          # SDN04-03 (E/W isolation) is exercised by the same check but is not separately attributable under a single test_id.
          test_id: "SDN04-02"
          labels: ["min_req", "network", "security"]
          step: vpc_isolation
        SgCrudCheck-create:
          test_id: "SDN02-01"
          labels: ["min_req", "network", "security"]
          step: sg_crud
          operations: ["create_vpc", "create_sg"]
        SgCrudCheck-read:
          test_id: "SDN02-02"
          labels: ["min_req", "network", "security"]
          step: sg_crud
          operations: ["read_sg"]
        SgCrudCheck-update:
          test_id: "SDN02-03"
          labels: ["min_req", "network", "security"]
          step: sg_crud
          operations: ["update_sg_add_rule", "update_sg_modify_rule", "update_sg_remove_rule"]
        SgCrudCheck-delete:
          test_id: "SDN02-04"
          labels: ["min_req", "network", "security"]
          step: sg_crud
          operations: ["delete_sg", "verify_deleted"]
        # SG/NACL enforcement + connectivity/traffic behavior have no dedicated
        # plan item (SG CRUD is SDN02-01..04; VPC isolation is SDN04-02).
        SecurityBlockingCheck:
          test_id: "N/A"
          labels: ["network", "security"]
          step: security_blocking
        NetworkConnectivityCheck:
          test_id: "N/A"
          labels: ["network"]
          step: connectivity_test
        TrafficFlowCheck:
          test_id: "N/A"
          labels: ["network"]
          step: traffic_validation
        VpcIpConfigCheck:
          test_id: "IPAM02-01"
          labels: ["network"]
          step: vpc_ip_config
        DhcpIpManagementCheck:
          test_id: "IPAM01-01"
          labels: ["network", "ssh"]
          step: dhcp_ip_test

    sg_scoping:
      checks:
        SgWorkloadScopingCheck:
          test_id: "SDN02-05"
          labels: ["min_req", "network", "security"]
          step: sg_workload_scoping
        SgNodeScopingCheck:
          test_id: "SDN02-06"
          labels: ["min_req", "network", "security"]
          step: sg_node_scoping
        SgSubnetScopingCheck:
          test_id: "SDN02-07"
          labels: ["min_req", "network", "security"]
          step: sg_subnet_scoping
        SgServiceScopingCheck:
          test_id: "SDN02-09"
          labels: ["min_req", "network", "security"]
          step: sg_service_scoping
        SgPortSecurityPolicyCheck:
          test_id: "SDN02-10"
          labels: ["min_req", "network", "security"]
          step: sg_port_security_policy

    sdn_policy:
      checks:
        SgPolicyPropagationTimingCheck:
          test_id: "SDN02-08"
          labels: ["min_req", "network", "security"]
          step: sg_policy_propagation
          max_propagation_seconds: 10

    sdn_logging:
      checks:
        SdnHardwareFaultLoggingCheck:
          test_id: "SDN09-01"
          labels: ["min_req", "network"]
          step: sdn_hardware_fault_logging
        SdnLatencyPerfLoggingCheck:
          test_id: "SDN09-02"
          labels: ["min_req", "network"]
          step: sdn_latency_perf_logging
        SdnFilterAuditTrailCheck:
          test_id: "SDN09-03"
          labels: ["min_req", "network", "security"]
          step: sdn_filter_audit_trail

    sdn:
      checks:
        ByoipCheck:
          test_id: "NET03-01"
          labels: ["min_req", "network"]
          step: byoip_test
        StablePrivateIpCheck:
          test_id: "SDN11-01"
          labels: ["min_req", "network"]
          step: stable_ip_test
        StableEgressIpCheck:
          test_id: "DMS05-01"
          labels: ["min_req", "network"]
          step: stable_egress_ip_test
        FloatingIpCheck:
          test_id: "SDN05-01"
          labels: ["min_req", "network"]
          step: floating_ip_test
          max_switch_seconds: 10
        LocalizedDnsCheck:
          test_id: "SDN06-01"
          labels: ["min_req", "network"]
          step: dns_test
        VpcPeeringCheck:
          test_id: "SDN07-01"
          labels: ["min_req", "network"]
          step: peering_test
        StorageL3RoutingCheck:
          test_id: "SDN08-01"
          labels: ["min_req", "network"]
          step: storage_l3_routing

    # Read-only metadata/API checks for provider-reported backend fabric
    # topology. These do not test isolation, IB keying, or data-plane bandwidth.
    fabric_topology:
      checks:
        BackendSwitchFabricCheck:
          test_id: "NET01-01"
          labels: ["min_req", "network"]
          step: backend_switch_fabric
        NvlinkDomainCheck:
          test_id: "NET02-02"
          labels: ["min_req", "network"]
          step: nvlink_domain

    teardown_checks:
      step: teardown
      checks:
        StepSuccessCheck:
          test_id: "N/A"
          labels: ["network"]

  exclude:
    labels: []
