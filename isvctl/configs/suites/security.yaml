# Security Validation - Canonical Contract
#
# Validations-only contract for infrastructure security hardening
# requirements. Provider configs import this file and supply their own
# commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields.
#
# Quick start:
#   1. Copy providers/my-isv/config/security.yaml to providers/<your-platform>/config/security.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/security.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/security.yaml
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  cluster_name: "security-validation"
  description: "Infrastructure security hardening validation"
  platform: security

  settings:
    region: ""
    min_resources: 1
    tenant_id: "{{env.NCP_TENANT_ID | default('', true)}}"
    topology_block_id: "isv-cap04-block"
    requested_compute: 2
    requested_network: 1
    requested_storage: 0

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    bmc_management_network:
      checks:
        BmcManagementNetworkCheck:
          test_id: "SEC12-01"
          labels: ["min_req", "network", "security"]
          step: bmc_management_network

    bmc_isolation:
      checks:
        BmcTenantIsolationCheck:
          test_id: "SEC12-02"
          labels: ["min_req", "network", "security"]
          step: bmc_tenant_isolation

    bmc_protocol_security:
      checks:
        BmcProtocolSecurityCheck:
          test_id: "CNP10-01"
          labels: ["min_req", "network", "security"]
          step: bmc_protocol_security

    bmc_bastion_access:
      checks:
        BmcBastionAccessCheck:
          test_id: "SEC12-03"
          labels: ["min_req", "network", "security"]
          step: bmc_bastion_access

    api_security:
      checks:
        ApiEndpointIsolationCheck:
          test_id: "SEC14-01"
          labels: ["min_req", "network", "security"]
          step: api_endpoint_isolation

    insecure_protocols:
      checks:
        InsecureProtocolsCheck:
          test_id: "SEC13-02"
          labels: ["min_req", "network", "security"]
          step: insecure_protocols_test

    mfa_enforcement:
      checks:
        MfaEnforcedCheck:
          test_id: "SEC07-01"
          labels: ["iam", "min_req", "security"]
          step: mfa_enforcement

    cert_rotation:
      checks:
        CertRotationCycleCheck:
          test_id: "SEC09-01"
          labels: ["min_req", "security"]
          step: cert_rotation_test

    kms_encryption_options:
      checks:
        KmsEncryptionOptionCheck:
          test_id: "SEC09-02"
          labels: ["min_req", "security"]
          step: kms_encryption_options_test

    centralized_kms:
      checks:
        CentralizedKmsCheck:
          test_id: "SEC09-03"
          labels: ["min_req", "security"]
          step: centralized_kms_test

    customer_managed_key:
      checks:
        CustomerManagedKeyCheck:
          test_id: "SEC09-04"
          labels: ["min_req", "security", "slow", "workload"]
          step: customer_managed_key_test

    service_account_auth:
      checks:
        ServiceAccountCredentialCheck:
          test_id: "SEC03-01"
          labels: ["iam", "min_req", "security"]
          step: sa_credential_test

    user_auth_oidc:
      checks:
        OidcUserAuthCheck:
          test_id: "SEC01-01"
          labels: ["iam", "min_req", "security"]
          step: oidc_user_auth_test

    short_lived_credentials:
      checks:
        ShortLivedCredentialsCheck:
          test_id: "SEC02-01"
          labels: ["iam", "min_req", "security"]
          step: short_lived_credentials_test

    least_privilege_policy:
      checks:
        LeastPrivilegePolicyCheck:
          test_id: "SEC04-01"
          labels: ["iam", "min_req", "security"]
          step: least_privilege_test

    minimal_role_enforcement:
      checks:
        MinimalRoleEnforcementCheck:
          test_id: "SEC04-02"
          labels: ["iam", "min_req", "security"]
          step: least_privilege_test

    audit_log_entry:
      checks:
        AuditLogEntryCheck:
          test_id: "SEC08-01"
          labels: ["min_req", "security"]
          step: audit_logging_test

    audit_log_retention:
      checks:
        AuditLogRetentionCheck:
          test_id: "SEC08-02"
          labels: ["min_req", "security"]
          step: audit_logging_test

    tenant_isolation:
      checks:
        TenantIsolationCheck:
          test_id: "SEC11-01"
          labels: ["iam", "min_req", "network", "security"]
          step: tenant_isolation_test

    # Verify capacity is logically grouped and pinned to one tenant/account
    # boundary.
    capacity_reservation_grouping:
      checks:
        CapacityReservationGroupingCheck:
          test_id: "CAP04-01"
          labels: ["bare_metal", "capacity", "min_req", "security"]
          step: capacity_reservation_grouping
          min_resources: "{{min_resources}}"

    # Verify a topology block is allocated as one atomic unit with homogeneous
    # performance and one tenant isolation boundary.
    topology_block_atomic_allocation:
      step: topology_block_atomic_allocation
      checks:
        CapacityTopologyBlockAtomicAllocationCheck:
          test_id: "CAP04-02"
          labels: ["bare_metal", "capacity", "min_req", "security"]
          min_resources: 2

    teardown_checks:
      step: teardown
      checks:
        StepSuccessCheck:
          test_id: "N/A"
          labels: ["security"]

  exclude:
    labels: []
