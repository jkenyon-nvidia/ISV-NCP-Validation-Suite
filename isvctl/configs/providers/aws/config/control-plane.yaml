# AWS Control Plane Validation Configuration
#
# Imports validations from the provider-agnostic control plane canonical config.
# This file only provides AWS-specific commands (boto3 stubs) and settings.
#
# Tests:
# - API Health: Authentication and service connectivity
# - Access Key Lifecycle: Create, authenticate, disable, verify rejection, delete
# - Tenant Lifecycle: Create, list, get info, delete
# - S3 Object Lifecycle: PutObject -> GetObject (byte-compare) -> DeleteObject
#   (DATASVC-XX-01 / issue #262: authenticated S3-compatible API data path)
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/aws/config/control-plane.yaml
#
# Required IAM Permissions:
#   sts:GetCallerIdentity, iam:ListUsers, ec2:DescribeRegions, s3:ListBuckets,
#   iam:CreateUser, iam:DeleteUser, iam:CreateAccessKey, iam:DeleteAccessKey, iam:UpdateAccessKey,
#   resource-groups:CreateGroup, resource-groups:DeleteGroup, resource-groups:ListGroups, resource-groups:GetGroup,
#   s3:CreateBucket, s3:DeleteBucket, s3:ListBucket, s3:ListBucketVersions,
#   s3:PutObject, s3:GetObject, s3:DeleteObject, s3:DeleteObjectVersion

import:
  - ../../../suites/control-plane.yaml

version: "1.0"

commands:
  control_plane:
    phases: ["setup", "test", "teardown"]
    steps:
      # =======================================================================
      # SETUP: API Health Check
      # =======================================================================
      - name: check_api
        phase: setup
        command: "python3 ../scripts/control-plane/check_api.py"
        args: ["--region", "{{region}}", "--services", "{{services}}"]
        timeout: 120

      # =======================================================================
      # SETUP: Create Resources
      # =======================================================================
      - name: create_access_key
        phase: setup
        command: "python3 ../scripts/control-plane/create_access_key.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: create_tenant
        phase: setup
        command: "python3 ../scripts/control-plane/create_tenant.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # =======================================================================
      # TEST: Access Key Lifecycle
      # =======================================================================
      - name: test_access_key
        phase: test
        command: "python3 ../scripts/control-plane/test_access_key.py"
        args:
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--secret-access-key"
          - "{{steps.create_access_key.secret_access_key}}"
          - "--region"
          - "{{region}}"
          - "--wait"
          - "5"
          - "--retries"
          - "5"
        sensitive_args: ["--secret-access-key"]
        timeout: 120

      - name: disable_access_key
        phase: test
        command: "python3 ../scripts/control-plane/disable_access_key.py"
        args:
          - "--username"
          - "{{steps.create_access_key.username}}"
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
        timeout: 60

      - name: verify_key_rejected
        phase: test
        command: "python3 ../scripts/control-plane/verify_key_rejected.py"
        args:
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--secret-access-key"
          - "{{steps.create_access_key.secret_access_key}}"
          - "--region"
          - "{{region}}"
          - "--wait"
          - "5"
          - "--retries"
          - "5"
        sensitive_args: ["--secret-access-key"]
        timeout: 120

      # =======================================================================
      # TEST: Tenant Lifecycle
      # =======================================================================
      - name: list_tenants
        phase: test
        command: "python3 ../scripts/control-plane/list_tenants.py"
        args:
          - "--region"
          - "{{region}}"
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
        timeout: 60

      - name: get_tenant
        phase: test
        command: "python3 ../scripts/control-plane/get_tenant.py"
        args:
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # =======================================================================
      # TEST: S3 Object Lifecycle (DATASVC-XX-01)
      # =======================================================================
      - name: s3_object_lifecycle
        phase: test
        command: "python3 ../scripts/control-plane/s3_object_lifecycle.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      # =======================================================================
      # TEARDOWN: Cleanup Resources
      # =======================================================================
      - name: delete_access_key
        phase: teardown
        command: "python3 ../scripts/control-plane/delete_access_key.py"
        args:
          - "--username"
          - "{{steps.create_access_key.username}}"
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60
        output_schema: teardown

      - name: delete_tenant
        phase: teardown
        command: "python3 ../scripts/control-plane/delete_tenant.py"
        args:
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
          - "--region"
          - "{{region}}"
        timeout: 60
        output_schema: teardown

tests:
  cluster_name: "aws-control-plane-validation"
  description: "AWS control plane: API health, access key lifecycle, tenant lifecycle"

  settings:
    region: "us-west-2"
    services: "ec2,s3,iam,sts"
