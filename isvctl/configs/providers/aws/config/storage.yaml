# AWS Storage Validation Configuration
#
# Imports suites/storage.yaml and wires AWS implementations for:
#   - Block volume (EBS): launch/create/snapshot/resize/persistence/teardown
#   - Home directory (FSx for OpenZFS): NFSv4, volume quota, uid/gid accounting
#   - High-speed storage (FSx for Lustre): provisioning, multiple filesystems,
#     live expansion, root-squash (other HSS checks excluded — need a mounted
#     client or are not exposed by managed FSx)
#
# Block-volume steps reuse the VM scripts for launch/teardown; volume steps
# live in scripts/storage/. FSx steps are self-contained (create → assert →
# cleanup) and create real PERSISTENT_2 filesystems (~10-15 min each, cost).
# HSS checks ship unreleased; run with ISVTEST_INCLUDE_UNRELEASED=1.
#
# Usage:
#   AWS_REGION=us-west-2 ISVTEST_INCLUDE_UNRELEASED=1 \
#     uv run isvctl test run -f isvctl/configs/providers/aws/config/storage.yaml
#
# Required IAM Permissions (block volume):
#   ec2:DescribeInstances, ec2:RunInstances, ec2:TerminateInstances,
#   ec2:StopInstances, ec2:StartInstances, ec2:DescribeImages, ec2:DescribeSubnets,
#   ec2:DescribeVpcs, ec2:CreateKeyPair, ec2:DeleteKeyPair, ec2:CreateSecurityGroup,
#   ec2:DeleteSecurityGroup, ec2:AuthorizeSecurityGroupIngress, ec2:CreateTags,
#   ec2:CreateVolume, ec2:DeleteVolume, ec2:DescribeVolumes, ec2:AttachVolume,
#   ec2:DetachVolume, ec2:ModifyVolume, ec2:DescribeVolumesModifications,
#   ec2:CreateSnapshot, ec2:DeleteSnapshot, ec2:DescribeSnapshots
# Plus FSx permissions for the high-speed steps (fsx:CreateFileSystem,
# fsx:DescribeFileSystems, fsx:UpdateFileSystem, fsx:DeleteFileSystem, etc.).

import:
  - ../../../suites/storage.yaml

version: "1.0"

commands:
  storage:
    phases: ["setup", "test", "teardown"]
    steps:
      # ─── Block volume (EBS) ────────────────────────────────────────
      - name: launch_instance
        phase: setup
        command: "python3 ../scripts/vm/launch_instance.py"
        args:
          - "--name"
          - "isv-test-block"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 600

      - name: create_volume
        phase: setup
        command: "python3 ../scripts/storage/create_volume.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--size-gib"
          - "{{volume_size_gib}}"
        timeout: 600

      - name: snapshot_lifecycle
        phase: test
        command: "python3 ../scripts/storage/snapshot_lifecycle.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--expected-content"
          - "{{steps.create_volume.sentinel_content}}"
        timeout: 900

      - name: volume_resize
        phase: test
        command: "python3 ../scripts/storage/volume_resize.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--mount-point"
          - "{{steps.create_volume.mount_point}}"
        timeout: 900

      - name: volume_persistence
        phase: test
        command: "python3 ../scripts/storage/volume_persistence.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--mount-point"
          - "{{steps.create_volume.mount_point}}"
          - "--expected-content"
          - "{{steps.create_volume.sentinel_content}}"
        timeout: 900

      # ─── Home directory storage (FSx for OpenZFS) ──────────────────
      # Reuses the block fixture's EC2 client. The script creates one minimum
      # Single-AZ filesystem, runs all DIR01/DIR02 probes, then deletes it.
      - name: home_directory_storage
        phase: test
        command: "python3 ../scripts/storage/home_directory_storage_test.py"
        requires_available_validations:
          - DirectoryFilesystemQuotaCheck
          - DirectoryUsageAccountingCheck
          - DirectoryNfsAvailabilityCheck
        args:
          - "--region"
          - "{{region}}"
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
        # 1800 (create) + 900 (volume) + 600 (mount) + 900 (delete) + slack.
        timeout: 4500

      # ─── High-speed storage (FSx for Lustre) ────────────────────────
      # Timeouts = worst-case waits in scripts/common/fsx.py + slack so the
      # orchestrator never kills a script mid-cleanup.
      - name: provision_storage
        phase: test
        command: "python ../scripts/storage/provision_storage_test.py"
        requires_available_validations:
          - HssStorageProvisioningCheck
        args: ["--region", "{{region}}", "--capacity-gib", "1200"]
        # 1800 (create) + 900 (delete) + slack.
        timeout: 3000

      - name: multiple_filesystems
        phase: test
        command: "python ../scripts/storage/multiple_filesystems_test.py"
        requires_available_validations:
          - HssMultipleFilesystemsCheck
        args: ["--region", "{{region}}", "--count", "2", "--max-fs-tib", "50"]
        # 2x1800 (creates) + 2x900 (per-filesystem delete waits) + slack.
        timeout: 5700

      - name: live_expansion
        phase: test
        command: "python ../scripts/storage/live_expansion_test.py"
        requires_available_validations:
          - HssLiveExpansionCheck
        args: ["--region", "{{region}}"]
        # 1800 (create) + 3600 (capacity scale) + 900 (delete) + slack.
        timeout: 6600

      - name: root_squash
        phase: test
        command: "python ../scripts/storage/root_squash_test.py"
        requires_available_validations:
          - HssRootSquashCheck
        args: ["--region", "{{region}}"]
        # 1800 (create) + 2x600 (squash toggles) + 900 (delete) + slack.
        timeout: 4200

      # ─── Teardown (block volume fixture) ────────────────────────────
      - name: teardown_volume
        phase: teardown
        command: "python3 ../scripts/storage/teardown_volume.py"
        args:
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "{{teardown_flag}}"
        timeout: 300

      - name: teardown
        phase: teardown
        command: "python3 ../scripts/vm/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--delete-key-pair"
          - "--delete-security-group"
          - "{{teardown_flag}}"
        timeout: 600

tests:
  cluster_name: "aws-storage-validation"
  description: "AWS storage validation (EBS block volume + FSx for Lustre)"

  settings:
    region: "{{env.AWS_REGION | default('us-west-2', true)}}"
    instance_type: "m6i.large"
    volume_size_gib: "10"
    teardown_flag: "{{(env.BLOCK_STORAGE_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  exclude:
    # HSS checks that need a mounted Lustre client or are not exposed by
    # managed FSx. Wired for my-isv; not yet implemented on AWS.
    tests:
      - HssQosThroughputCheck # HSS02-01: IOPS/bandwidth need an fio benchmark on a mounted client
      - HssNonDisruptiveUpgradeCheck # HSS05-01: FSx maintenance windows do not model deferring maintenance up to 2 weeks
      - HssRdmaMemoryProtectionCheck # HSS06-01: FSx Lustre EFA/RDMA does not expose per-key memory protection via API
      - HssParallelFsProvisioningCheck # HSS07-01: mount_successful needs a mounted Lustre client (follow-up)
      - HssQuotaEnforcementCheck # HSS12-01: needs `lfs setquota`/`lfs quota` on a mounted client
      - HssFlockMountCheck # HSS14-01: needs a mounted client (mount -o flock)
      - HssChangelogAuditCheck # HSS15-01: needs Lustre changelog registration on a mounted client
      - HssMultipathCheck # HSS18-01: needs a mounted client (`lfs check servers`)
