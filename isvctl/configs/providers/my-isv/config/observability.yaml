# my-isv Observability Validation Configuration - Living Example
#
# Imports validations from the provider-agnostic observability template and
# wires them to generic template scripts. In demo mode the scripts emit
# dummy-success evidence so the pipeline runs without real log collectors.

import:
  - ../../../suites/observability.yaml

version: "1.0"

commands:
  observability:
    phases: ["test"]
    steps:
      - name: telemetry_delivery_latency
        phase: test
        continue_on_failure: true
        command: "python ../scripts/observability/telemetry_delivery_test.py"
        args:
          - "--region"
          - "{{region}}"
          - "--network-id"
          - "{{network_id}}"
          - "--max-delivery-seconds"
          - "120"
        timeout: 60

      - name: north_south_network_telemetry
        phase: test
        continue_on_failure: true
        command: "python ../scripts/observability/network_telemetry_test.py"
        args:
          - "--region"
          - "{{region}}"
          - "--network-id"
          - "{{network_id}}"
          - "--aspect"
          - "north_south_network_telemetry"
        timeout: 60

      - name: east_west_network_telemetry
        phase: test
        continue_on_failure: true
