repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
      # Run the linter.
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/google/yamlfmt
    # Run the formatter.
    rev: v0.20.0
    hooks:
      - id: yamlfmt

  - repo: local
    hooks:
      - id: check-md-links
        name: check markdown relative links
        entry: uv run python scripts/check_md_links.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: check-spdx-headers
        name: check SPDX license headers
        entry: uv run python scripts/add_spdx_headers.py --check
        language: system
        pass_filenames: false
        types_or: [python, shell, yaml]

      - id: plan-coverage
        name: check test-plan coverage
        entry: uv run python scripts/test_plan_coverage.py --check
        language: system
        pass_filenames: false
        files: ^(docs/test-plan\.yaml|isvctl/configs/suites/.*\.yaml|scripts/test_plan_coverage\.py)$

      - id: validate-suites
        name: check tests suites (test_id + labels)
        entry: uv run python scripts/validate_suite_wiring.py --check
        language: system
        pass_filenames: false
        files: ^isvctl/configs/suites/.*\.yaml$
